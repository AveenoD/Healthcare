<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Community Healthcare</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">

  <div class="auth-wrapper">

    <div class="auth-logo">
      <div class="logo-icon">➕</div>
      <div class="logo-text">
        <strong>Community Healthcare</strong>
        <span>Support System</span>
      </div>
    </div>

    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Register to access healthcare services</p>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Enter your full name" />
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="regPhone" placeholder="10 digit phone number" maxlength="10" />
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="number" id="regAge" placeholder="Enter your age" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Create a password" />
      </div>

      <button class="btn-primary" onclick="registerUser()">
        Register
      </button>

      <p class="auth-footer">
        Already have an account?
        <a href="index.html">Login here</a>
      </p>
    </div>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
